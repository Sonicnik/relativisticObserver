<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>HKU Astrophysics: Spaghettification Sandbox</title>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/holistic/holistic.js" crossorigin="anonymous"></script>
    <style>
        body { margin: 0; padding: 0; background-color: black; overflow: hidden; color: white; font-family: sans-serif; }
        canvas { display: block; width: 100vw; height: 100vh; object-fit: cover; transform: scaleX(-1); /* Mirror display */ }
        #ui { position: absolute; top: 20px; left: 20px; z-index: 10; pointer-events: none; }
        h1 { margin: 0; font-size: 24px; text-shadow: 0 0 10px #00ffff; }
        p { font-size: 16px; color: #aaa; }
    </style>
</head>
<body>
    <div id="ui">
        <h1>Tidal Disruption Event Simulator</h1>
        <p>Your head is a Black Hole. Pinch your right hand to spawn a star. Throw it into orbit!</p>
        <p id="status">Loading AI Models... Please wait.</p>
    </div>
    <video id="webcam" autoplay playsinline style="display:none;"></video>
    <canvas id="output_canvas"></canvas>

<script>
    const videoElement = document.getElementById('webcam');
    const canvasElement = document.getElementById('output_canvas');
    const canvasCtx = canvasElement.getContext('2d');
    const statusText = document.getElementById('status');

    // Set canvas resolution
    canvasElement.width = window.innerWidth;
    canvasElement.height = window.innerHeight;

    // --- PHYSICS & GAME STATE ---
    let blackHole = { x: canvasElement.width / 2, y: canvasElement.height / 2, active: false };
    let stars = [];
    let spaghettifiedParticles = [];
    
    // Hand tracking for throwing
    let isPinching = false;
    let heldStar = null;
    let prevHandPos = { x: 0, y: 0 };
    let handVelocity = { x: 0, y: 0 };

    // TUNED VARIABLES
    const BH_MASS = 18000;         // Stronger gravitational pull
    const THROW_DAMPENING = 0.25;  // Reduces wild initial velocity so stars feel heavy
    const BOUNCE_RESTITUTION = 0.7; // Bounciness of the screen edges
    const ROCHE_LIMIT = 200;       // Distance at which stars get shredded
    const EVENT_HORIZON = 40;      // Distance at which matter is consumed

    // --- MEDIAPIPE SETUP ---
    const holistic = new Holistic({locateFile: (file) => {
        return `https://cdn.jsdelivr.net/npm/@mediapipe/holistic/${file}`;
    }});
    
    holistic.setOptions({
        modelComplexity: 1,
        smoothLandmarks: true,
        enableSegmentation: false,
        refineFaceLandmarks: false,
        minDetectionConfidence: 0.5,
        minTrackingConfidence: 0.5
    });

    holistic.onResults(onResults);

    const camera = new Camera(videoElement, {
        onFrame: async () => { await holistic.send({image: videoElement}); },
        width: 1280, height: 720
    });
    camera.start();

    // --- MAIN LOOP ---
    function onResults(results) {
        statusText.innerText = "Active. Track your face and right hand.";
        canvasCtx.save();
        
        // Draw the webcam feed with a dark space filter
        canvasCtx.globalAlpha = 0.3; 
        canvasCtx.drawImage(results.image, 0, 0, canvasElement.width, canvasElement.height);
        canvasCtx.globalAlpha = 1.0;

        // Darken the background to create motion trails for the stars
        canvasCtx.fillStyle = 'rgba(0, 0, 5, 0.4)';
        canvasCtx.fillRect(0, 0, canvasElement.width, canvasElement.height);

        // 1. Update Black Hole Position (Nose Landmark)
        if (results.poseLandmarks) {
            const nose = results.poseLandmarks[0];
            // Smooth movement (Lerp)
            blackHole.x += (nose.x * canvasElement.width - blackHole.x) * 0.2;
            blackHole.y += (nose.y * canvasElement.height - blackHole.y) * 0.2;
            blackHole.active = true;
            drawBlackHole(blackHole.x, blackHole.y);
        } else {
            blackHole.active = false;
        }

        // 2. Handle Hand Gestures (Right Hand Pinch to Spawn/Throw Star)
        if (results.rightHandLandmarks && blackHole.active) {
            const thumb = results.rightHandLandmarks[4];
            const index = results.rightHandLandmarks[8];
            const handX = index.x * canvasElement.width;
            const handY = index.y * canvasElement.height;

            // Calculate pinch distance
            const pinchDist = Math.hypot(thumb.x - index.x, thumb.y - index.y);
            const currentlyPinching = pinchDist < 0.05;

            // Calculate hand velocity for throwing
            handVelocity.x = handX - prevHandPos.x;
            handVelocity.y = handY - prevHandPos.y;
            prevHandPos = { x: handX, y: handY };

            // Draw hand tracker
            canvasCtx.beginPath();
            canvasCtx.arc(handX, handY, 10, 0, 2 * Math.PI);
            canvasCtx.fillStyle = currentlyPinching ? '#00ffff' : 'white';
            canvasCtx.fill();

            if (currentlyPinching && !isPinching) {
                // Just started pinching -> Spawn a star
                heldStar = { x: handX, y: handY, vx: 0, vy: 0, color: '#ffffff' };
            } else if (currentlyPinching && heldStar) {
                // Holding the star
                heldStar.x = handX;
                heldStar.y = handY;
                drawStar(heldStar);
            } else if (!currentlyPinching && isPinching && heldStar) {
                // Released the pinch -> Throw the star!
                heldStar.vx = handVelocity.x * THROW_DAMPENING;
                heldStar.vy = handVelocity.y * THROW_DAMPENING;
                stars.push(heldStar);
                heldStar = null;
            }
            isPinching = currentlyPinching;
        }

        // 3. Update Physics (Orbital Mechanics & Spaghettification)
        if (blackHole.active) {
            updateAndDrawStars();
            updateAndDrawParticles();
        }

        canvasCtx.restore();
    }

    function drawBlackHole(x, y) {
        // Accretion Disk Glow
        let gradient = canvasCtx.createRadialGradient(x, y, EVENT_HORIZON, x, y, ROCHE_LIMIT);
        gradient.addColorStop(0, 'rgba(0, 0, 0, 1)');
        gradient.addColorStop(0.1, 'rgba(255, 150, 0, 0.8)'); // Intense orange
        gradient.addColorStop(0.5, 'rgba(50, 0, 150, 0.2)'); // Deep purple
        gradient.addColorStop(1, 'rgba(0, 0, 0, 0)');

        canvasCtx.beginPath();
        canvasCtx.arc(x, y, ROCHE_LIMIT, 0, 2 * Math.PI);
        canvasCtx.fillStyle = gradient;
        canvasCtx.fill();

        // Event Horizon
        canvasCtx.beginPath();
        canvasCtx.arc(x, y, EVENT_HORIZON, 0, 2 * Math.PI);
        canvasCtx.fillStyle = 'black';
        canvasCtx.fill();
        canvasCtx.lineWidth = 2;
        canvasCtx.strokeStyle = 'white'; // Photon ring
        canvasCtx.stroke();
    }

    function drawStar(star) {
        canvasCtx.beginPath();
        canvasCtx.arc(star.x, star.y, 8, 0, 2 * Math.PI);
        canvasCtx.fillStyle = star.color;
        canvasCtx.shadowBlur = 15;
        canvasCtx.shadowColor = 'white';
        canvasCtx.fill();
        canvasCtx.shadowBlur = 0; // Reset
    }

    function updateAndDrawStars() {
        for (let i = stars.length - 1; i >= 0; i--) {
            let s = stars[i];
            
            // Gravity Calculation (Newton's Law)
            let dx = blackHole.x - s.x;
            let dy = blackHole.y - s.y;
            let dist = Math.hypot(dx, dy);

            if (dist < EVENT_HORIZON) {
                stars.splice(i, 1); // Consumed directly
                continue;
            }

            if (dist < ROCHE_LIMIT) {
                // TDE: Spaghettification! Shred the star into gas particles
                shredStar(s, dx, dy, dist);
                stars.splice(i, 1);
                continue;
            }

            // Apply gravitational force F = G*M/r^2
            let force = BH_MASS / (dist * dist);
            s.vx += force * (dx / dist);
            s.vy += force * (dy / dist);

            s.x += s.vx;
            s.y += s.vy;

            // Screen Edge Collisions
            if (s.x - 8 < 0) { 
                s.x = 8; 
                s.vx *= -BOUNCE_RESTITUTION; 
            }
            if (s.x + 8 > canvasElement.width) { 
                s.x = canvasElement.width - 8; 
                s.vx *= -BOUNCE_RESTITUTION; 
            }
            if (s.y - 8 < 0) { 
                s.y = 8; 
                s.vy *= -BOUNCE_RESTITUTION; 
            }
            if (s.y + 8 > canvasElement.height) { 
                s.y = canvasElement.height - 8; 
                s.vy *= -BOUNCE_RESTITUTION; 
            }

            drawStar(s);
        }
    }

    function shredStar(star, dx, dy, dist) {
        // Create 40 glowing gas particles where the star died
        for (let j = 0; j < 40; j++) {
            // Give them tangential velocity so they spiral instead of falling straight in
            let tangentX = -dy / dist;
            let tangentY = dx / dist;
            
            let speed = Math.random() * 5 + 5;
            
            spaghettifiedParticles.push({
                x: star.x + (Math.random() - 0.5) * 20,
                y: star.y + (Math.random() - 0.5) * 20,
                vx: star.vx * 0.5 + tangentX * speed + (Math.random() - 0.5) * 4,
                vy: star.vy * 0.5 + tangentY * speed + (Math.random() - 0.5) * 4,
                life: 1.0 // 1.0 to 0.0
            });
        }
    }

    function updateAndDrawParticles() {
        for (let i = spaghettifiedParticles.length - 1; i >= 0; i--) {
            let p = spaghettifiedParticles[i];
            
            let dx = blackHole.x - p.x;
            let dy = blackHole.y - p.y;
            let dist = Math.hypot(dx, dy);

            if (dist < EVENT_HORIZON || p.life <= 0) {
                spaghettifiedParticles.splice(i, 1); // Consumed
                // Flash the screen slightly when matter enters the event horizon
                canvasCtx.fillStyle = 'rgba(255, 255, 255, 0.05)';
                canvasCtx.fillRect(0, 0, canvasElement.width, canvasElement.height);
                continue;
            }

            // Stronger inward gravity + atmospheric drag for accretion disk spiral
            let force = (BH_MASS * 1.5) / (dist * dist);
            p.vx += force * (dx / dist);
            p.vy += force * (dy / dist);
            
            // Friction/Drag forces them to spiral inward
            p.vx *= 0.98;
            p.vy *= 0.98;

            p.x += p.vx;
            p.y += p.vy;
            p.life -= 0.005;

            // Draw glowing gas
            canvasCtx.beginPath();
            canvasCtx.arc(p.x, p.y, 3, 0, 2 * Math.PI);
            canvasCtx.fillStyle = `rgba(255, ${Math.floor(p.life * 150)}, 0, ${p.life})`;
            canvasCtx.fill();
        }
    }
</script>
</body>
</html>
