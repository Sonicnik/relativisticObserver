<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>HKU Astrophysics: Two-Player Spaghettification Sandbox</title>
    <style>
        body { margin: 0; padding: 0; background-color: black; overflow: hidden; color: white; font-family: sans-serif; }
        canvas { display: block; width: 100vw; height: 100vh; object-fit: cover; transform: scaleX(-1); /* Mirror display */ }
        #ui { position: absolute; top: 20px; left: 20px; z-index: 10; pointer-events: none; }
        h1 { margin: 0; font-size: 24px; text-shadow: 0 0 10px #00ffff; }
        p { font-size: 16px; color: #aaa; margin-top: 5px; }
        .roles { display: flex; gap: 50px; margin-top: 15px; font-weight: bold; }
        .role-left { color: #00ffff; }
        .role-right { color: #ff9600; }
    </style>
</head>
<body>
    <div id="ui">
        <h1>Tidal Disruption Co-Op Simulator</h1>
        <div class="roles">
            <div class="role-left">LEFT PLAYER: Pinch & Throw Stars</div>
            <div class="role-right">RIGHT PLAYER: Control the Black Hole</div>
        </div>
        <p id="status">Loading Dual AI Models... Please wait.</p>
    </div>
    
    <video id="webcam" autoplay playsinline style="display:none;"></video>
    <canvas id="output_canvas"></canvas>

<script type="module">
    import {
        FaceLandmarker,
        HandLandmarker,
        FilesetResolver
    } from "https://cdn.jsdelivr.net/npm/@mediapipe/tasks-vision@0.10.14";

    const videoElement = document.getElementById('webcam');
    const canvasElement = document.getElementById('output_canvas');
    const canvasCtx = canvasElement.getContext('2d');
    const statusText = document.getElementById('status');

    canvasElement.width = window.innerWidth;
    canvasElement.height = window.innerHeight;

    // --- PHYSICS & GAME STATE ---
    let blackHole = { x: canvasElement.width * 0.75, y: canvasElement.height / 2, active: false };
    let stars = [];
    let spaghettifiedParticles = [];
    
    let isPinching = false;
    let heldStar = null;
    let prevHandPos = { x: 0, y: 0 };
    let handVelocity = { x: 0, y: 0 };

    // Tuned physics variables from previous feedback
    const BH_MASS = 18000;         
    const THROW_DAMPENING = 0.25;  
    const BOUNCE_RESTITUTION = 0.7; 
    const ROCHE_LIMIT = 200;       
    const EVENT_HORIZON = 40;      

    // Tracking State
    let detectedFaces = [];
    let detectedHands = [];
    let currentVideoFrame = null;

    // --- MEDIAPIPE TASKS INITIALIZATION ---
    let faceLandmarker = null;
    let handLandmarker = null;

    async function initializeVisionTasks() {
        const vision = await FilesetResolver.forVisionTasks(
            "https://cdn.jsdelivr.net/npm/@mediapipe/tasks-vision@0.10.14/wasm"
        );

        faceLandmarker = await FaceLandmarker.createFromOptions(vision, {
            baseOptions: {
                modelAssetPath:
                    "https://storage.googleapis.com/mediapipe-models/face_landmarker/face_landmarker/float16/1/face_landmarker.task"
            },
            numFaces: 2,
            outputFaceBlendshapes: false,
            runningMode: "VIDEO"
        });

        handLandmarker = await HandLandmarker.createFromOptions(vision, {
            baseOptions: {
                modelAssetPath:
                    "https://storage.googleapis.com/mediapipe-models/hand_landmarker/hand_landmarker/float16/1/hand_landmarker.task"
            },
            numHands: 2,
            runningMode: "VIDEO"
        });
    }

    async function startCamera() {
        const stream = await navigator.mediaDevices.getUserMedia({
            video: { width: 1280, height: 720 }
        });
        videoElement.srcObject = stream;
        await videoElement.play();
        statusText.innerText = "System Active. Step into your zones.";
        requestAnimationFrame(processFrame);
    }

    function processFrame() {
        if (videoElement.readyState >= 2 && faceLandmarker && handLandmarker) {
            const now = performance.now();
            const faceResults = faceLandmarker.detectForVideo(videoElement, now);
            const handResults = handLandmarker.detectForVideo(videoElement, now);
            detectedFaces = faceResults.faceLandmarks || [];
            detectedHands = handResults.landmarks || [];
            currentVideoFrame = videoElement;
        }
        requestAnimationFrame(processFrame);
    }

    (async () => {
        try {
            await initializeVisionTasks();
            await startCamera();
        } catch (error) {
            console.error(error);
            statusText.innerText = "Camera or model failed to load. Check permissions.";
        }
    })();

    // --- MAIN GAME LOOP (Decoupled from camera FPS for smooth physics) ---
    function gameLoop() {
        canvasCtx.save();
        
        if (currentVideoFrame) {
            canvasCtx.globalAlpha = 0.3; 
            canvasCtx.drawImage(currentVideoFrame, 0, 0, canvasElement.width, canvasElement.height);
            canvasCtx.globalAlpha = 1.0;
        }

        // Dark background for motion trails
        canvasCtx.fillStyle = 'rgba(0, 0, 5, 0.4)';
        canvasCtx.fillRect(0, 0, canvasElement.width, canvasElement.height);

        // Draw Player Zone Divider
        canvasCtx.beginPath();
        canvasCtx.moveTo(canvasElement.width / 2, 0);
        canvasCtx.lineTo(canvasElement.width / 2, canvasElement.height);
        canvasCtx.strokeStyle = 'rgba(255, 255, 255, 0.15)';
        canvasCtx.lineWidth = 2;
        canvasCtx.setLineDash([15, 20]);
        canvasCtx.stroke();
        canvasCtx.setLineDash([]);

        // NOTE: Because the canvas is mirrored horizontally, an internal X value > 0.5 
        // renders on the LEFT side of the physical screen. 
        
        // 1. Find Black Hole Player (Physical Right side -> Internal X < 0.5)
        let rightPlayerFace = detectedFaces.find(face => face[1].x < 0.5); // Landmark 1 is the nose tip
        
        if (rightPlayerFace) {
            let targetX = rightPlayerFace[1].x * canvasElement.width;
            let targetY = rightPlayerFace[1].y * canvasElement.height;
            blackHole.x += (targetX - blackHole.x) * 0.2; // Smooth following
            blackHole.y += (targetY - blackHole.y) * 0.2;
            blackHole.active = true;
            drawBlackHole(blackHole.x, blackHole.y);
        } else {
            blackHole.active = false;
        }

        // 2. Find Thrower Player (Physical Left side -> Internal X > 0.5)
        let leftPlayerHand = detectedHands.find(hand => hand[0].x > 0.5); // Landmark 0 is the wrist

        if (leftPlayerHand && blackHole.active) {
            const thumb = leftPlayerHand[4];
            const index = leftPlayerHand[8];
            const handX = index.x * canvasElement.width;
            const handY = index.y * canvasElement.height;

            const pinchDist = Math.hypot(thumb.x - index.x, thumb.y - index.y);
            const currentlyPinching = pinchDist < 0.05;

            handVelocity.x = handX - prevHandPos.x;
            handVelocity.y = handY - prevHandPos.y;
            prevHandPos = { x: handX, y: handY };

            // Draw Thrower Tracker
            canvasCtx.beginPath();
            canvasCtx.arc(handX, handY, 10, 0, 2 * Math.PI);
            canvasCtx.fillStyle = currentlyPinching ? '#00ffff' : 'white';
            canvasCtx.fill();

            if (currentlyPinching && !isPinching) {
                heldStar = { x: handX, y: handY, vx: 0, vy: 0, color: '#ffffff' };
            } else if (currentlyPinching && heldStar) {
                heldStar.x = handX;
                heldStar.y = handY;
                drawStar(heldStar);
            } else if (!currentlyPinching && isPinching && heldStar) {
                heldStar.vx = handVelocity.x * THROW_DAMPENING;
                heldStar.vy = handVelocity.y * THROW_DAMPENING;
                stars.push(heldStar);
                heldStar = null;
            }
            isPinching = currentlyPinching;
        }

        // 3. Physics Execution
        if (blackHole.active) {
            updateAndDrawStars();
            updateAndDrawParticles();
        }

        canvasCtx.restore();
        requestAnimationFrame(gameLoop); // Loop continuously
    }

    // Start the game loop
    requestAnimationFrame(gameLoop);

    // --- RENDER & MATH FUNCTIONS ---
    function drawBlackHole(x, y) {
        let gradient = canvasCtx.createRadialGradient(x, y, EVENT_HORIZON, x, y, ROCHE_LIMIT);
        gradient.addColorStop(0, 'rgba(0, 0, 0, 1)');
        gradient.addColorStop(0.1, 'rgba(255, 150, 0, 0.8)'); 
        gradient.addColorStop(0.5, 'rgba(50, 0, 150, 0.2)'); 
        gradient.addColorStop(1, 'rgba(0, 0, 0, 0)');

        canvasCtx.beginPath();
        canvasCtx.arc(x, y, ROCHE_LIMIT, 0, 2 * Math.PI);
        canvasCtx.fillStyle = gradient;
        canvasCtx.fill();

        canvasCtx.beginPath();
        canvasCtx.arc(x, y, EVENT_HORIZON, 0, 2 * Math.PI);
        canvasCtx.fillStyle = 'black';
        canvasCtx.fill();
        canvasCtx.lineWidth = 2;
        canvasCtx.strokeStyle = 'white'; 
        canvasCtx.stroke();
    }

    function drawStar(star) {
        canvasCtx.beginPath();
        canvasCtx.arc(star.x, star.y, 8, 0, 2 * Math.PI);
        canvasCtx.fillStyle = star.color;
        canvasCtx.shadowBlur = 15;
        canvasCtx.shadowColor = 'white';
        canvasCtx.fill();
        canvasCtx.shadowBlur = 0; 
    }

    function updateAndDrawStars() {
        for (let i = stars.length - 1; i >= 0; i--) {
            let s = stars[i];
            
            let dx = blackHole.x - s.x;
            let dy = blackHole.y - s.y;
            let dist = Math.hypot(dx, dy);

            if (dist < EVENT_HORIZON) {
                stars.splice(i, 1); 
                continue;
            }

            if (dist < ROCHE_LIMIT) {
                shredStar(s, dx, dy, dist);
                stars.splice(i, 1);
                continue;
            }

            let force = BH_MASS / (dist * dist);
            s.vx += force * (dx / dist);
            s.vy += force * (dy / dist);

            s.x += s.vx;
            s.y += s.vy;

            if (s.x - 8 < 0) { s.x = 8; s.vx *= -BOUNCE_RESTITUTION; }
            if (s.x + 8 > canvasElement.width) { s.x = canvasElement.width - 8; s.vx *= -BOUNCE_RESTITUTION; }
            if (s.y - 8 < 0) { s.y = 8; s.vy *= -BOUNCE_RESTITUTION; }
            if (s.y + 8 > canvasElement.height) { s.y = canvasElement.height - 8; s.vy *= -BOUNCE_RESTITUTION; }

            drawStar(s);
        }
    }

    function shredStar(star, dx, dy, dist) {
        for (let j = 0; j < 40; j++) {
            let tangentX = -dy / dist;
            let tangentY = dx / dist;
            let speed = Math.random() * 5 + 5;
            
            spaghettifiedParticles.push({
                x: star.x + (Math.random() - 0.5) * 20,
                y: star.y + (Math.random() - 0.5) * 20,
                vx: star.vx * 0.5 + tangentX * speed + (Math.random() - 0.5) * 4,
                vy: star.vy * 0.5 + tangentY * speed + (Math.random() - 0.5) * 4,
                life: 1.0 
            });
        }
    }

    function updateAndDrawParticles() {
        for (let i = spaghettifiedParticles.length - 1; i >= 0; i--) {
            let p = spaghettifiedParticles[i];
            
            let dx = blackHole.x - p.x;
            let dy = blackHole.y - p.y;
            let dist = Math.hypot(dx, dy);

            if (dist < EVENT_HORIZON || p.life <= 0) {
                spaghettifiedParticles.splice(i, 1);
                canvasCtx.fillStyle = 'rgba(255, 255, 255, 0.05)';
                canvasCtx.fillRect(0, 0, canvasElement.width, canvasElement.height);
                continue;
            }

            let force = (BH_MASS * 1.5) / (dist * dist);
            p.vx += force * (dx / dist);
            p.vy += force * (dy / dist);
            
            p.vx *= 0.98;
            p.vy *= 0.98;

            p.x += p.vx;
            p.y += p.vy;
            p.life -= 0.005;

            canvasCtx.beginPath();
            canvasCtx.arc(p.x, p.y, 3, 0, 2 * Math.PI);
            canvasCtx.fillStyle = `rgba(255, ${Math.floor(p.life * 150)}, 0, ${p.life})`;
            canvasCtx.fill();
        }
    }
</script>
</body>
</html>
